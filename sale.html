<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sdchickenkaup.in</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap');

        body { 
            background: radial-gradient(circle at center, #cc0000 0%, #800000 100%);
            color: #ffffff; 
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .glass-frame {
            position: relative;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 15px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .glass-frame:hover {
            transform: scale(1.05) translateY(-10px);
            background: rgba(255, 255, 255, 0.2);
            border-color: #ffffff;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.4);
        }

        .price-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding: 10px 5px;
        }

        .price-value {
            font-weight: 900;
            font-size: 2rem;
            letter-spacing: -1px;
        }

        .floating-text {
            position: fixed;
            font-size: 20vw;
            font-weight: 900;
            color: #ffffff;
            opacity: 0.05;
            z-index: -1;
            pointer-events: none;
            white-space: nowrap;
        }

        .action-btn {
            background: white;
            color: #800000;
            padding: 8px 20px;
            border-radius: 10px;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 12px;
            transition: 0.3s;
        }

        .action-btn:hover {
            background: #000;
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="floating-text top-0 left-0">PREMIUM</div>
    <div class="floating-text bottom-0 right-0">SD SALE</div>

    <nav class="p-8 flex justify-between items-center relative z-10">
        <div class="text-3xl font-black tracking-tighter uppercase">SD<span class="opacity-50">.</span></div>
        <div class="text-[10px] font-bold uppercase tracking-[0.5em] border-2 border-white/20 px-4 py-2 rounded-lg">Kaup 2026</div>
    </nav>

    <header class="py-20 text-center px-6">
        <h1 data-aos="zoom-in" class="text-7xl md:text-9xl font-black leading-none uppercase tracking-tighter">
            THE <br> <span class="opacity-50">CHICKEN</span> LIST.
        </h1>
        
        <div data-aos="fade-up" data-aos-delay="300" class="mt-6">
            <h2 class="text-lg md:text-2xl font-bold uppercase tracking-[1.2em] text-black/80">
                kattda &nbsp; kori
            </h2>
            <div class="h-[1px] w-32 bg-white mx-auto mt-6 opacity-20"></div>
        </div>
    </header>

    <main class="container mx-auto px-6 py-10">
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 md:gap-12">

        <div data-aos="fade-up">
            <div class="glass-frame flex flex-col h-full">
                <div class="w-full aspect-[4/5] overflow-hidden rounded-xl">
                    <img src="SD Images/cimage1.jpg" class="w-full h-full object-cover" alt="Chicken 1">
                </div>
                
                <div class="price-box flex justify-between items-end mt-auto">
                    <div class="flex flex-col">
                        <span class="price-value text-2xl md:text-3xl">₹850</span>
                        <span class="text-[10px] uppercase tracking-wider text-white/50 font-bold mt-1">updated: Jan 20, 2026</span>
                    </div>
                    <a href="callnow.html" class="action-btn px-4 py-2 text-center">Order Now</a>
                </div>
            </div>
        </div>

        <div data-aos="fade-up" data-aos-delay="100">
            <div class="glass-frame flex flex-col h-full">
                <div class="w-full aspect-[4/5] overflow-hidden rounded-xl">
                    <img src="SD Images/cimage2.jpg" class="w-full h-full object-cover" alt="Chicken 2">
                </div>
                
                <div class="price-box flex justify-between items-end mt-auto">
                    <div class="flex flex-col">
                        <span class="price-value text-2xl md:text-3xl">₹1,200</span>
                        <span class="text-[10px] uppercase tracking-wider text-white/50 font-bold mt-1">updated: Jan 25, 2026</span>
                    </div>
                    <a href="callnow.html" class="action-btn px-4 py-2 text-center">Order Now</a>
                </div>
            </div>
        </div>

        <div data-aos="fade-up" data-aos-delay="200">
            <div class="glass-frame flex flex-col h-full">
                <div class="w-full aspect-[4/5] overflow-hidden rounded-xl">
                    <img src="SD Images/cimage3.jpg" class="w-full h-full object-cover" alt="Chicken 3">
                </div>
                
                <div class="price-box flex justify-between items-end mt-auto">
                    <div class="flex flex-col">
                        <span class="price-value text-2xl md:text-3xl">₹450</span>
                        <span class="text-[10px] uppercase tracking-wider text-white/50 font-bold mt-1">updated: Jan 28, 2026</span>
                    </div>
                    <a href="callnow.html" class="action-btn px-4 py-2 text-center">Order Now</a>
                </div>
            </div>
        </div>

    </div>
</main>

    <footer class="p-3 text-center border-t border-white/5">
                <p class="text-[10px] text-white/20 uppercase tracking-[1em]">&copy; 2026 SD CHICKEN KAUP</p>
                <br>
            <p class="text-xs text-white/40">
                Developed with ❤️ by <a href="https://www.instagram.com/adishe77y?igsh=cDN5c2NxNzVneG8w" class="hover:text-yellow-400 transition-colors">@adishe77y</a>
            </p>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: false });
    </script>
</body>
</html>
